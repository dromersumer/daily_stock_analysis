name: BIST Portfolio Analysis

on:
  schedule:
    - cron: '45 14 * * 1-5' # Hafta içi her gün TSİ 17:45
  workflow_dispatch:      # Manuel çalıştırma için

jobs:
  run-portfolio-manager:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BIST Quant Engine
        env:
          PORTFOLIO_TYPE: 'BIST'
          PORTFOLIO_CAPITAL: '100000'
          STOCK_LIST: 'AKSEN.IS,ALTNY.IS,ASELS.IS,ASTOR.IS,BIMAS.IS,EREGL.IS,FROTO.IS,ISDMR.IS,ISMEN.IS,KATMR.IS,KCHOL.IS,KONTR.IS,MIATK.IS,ODINE.IS,OTKAR.IS,RALYH.IS,SISE.IS,THYAO.IS,TUPRS.IS'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WOLFRAM_ALPHA_APPID: ${{ secrets.WOLFRAM_ALPHA_APPID }}
          USE_AI: 'true'
        run: python main.py
