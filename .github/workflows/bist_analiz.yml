name: BIST Quant-AI Terminal

on:
  schedule:
    # Hafta içi her gün Türkiye saati ile 18:30'da (BIST kapanışı sonrası) çalışır.
    # Not: GitHub UTC kullanır, 15:30 UTC = 18:30 TSİ.
    - cron: '30 15 * * 1-5' 
  workflow_dispatch: # Manuel "Run workflow" butonu için.

jobs:
  run-portfolio-manager:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Kodu Klonla
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12 Kurulumu (Google Tavsiyesi)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ⚙️ Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Apex Quant Motorunu Çalıştır (v20.0)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVDS_API_KEY: ${{ secrets.EVDS_API_KEY }}
          # Varsayılan değerler: Eğer GitHub Variables tanımlı değilse bunları kullanır.
          PORTFOLIO_CAPITAL: ${{ vars.PORTFOLIO_CAPITAL || '100000' }}
          STOCK_LIST: ${{ vars.STOCK_LIST || 'THYAO.IS,AKSA.IS,TUPRS.IS,ASELS.IS,SISE.IS,BIMAS.IS' }}
        run: python main.py
