name: BIST Quant-AI Terminal

on:
  schedule:
    - cron: '30 15 * * 1-5' 
  workflow_dispatch: 

jobs:
  run-portfolio-manager:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Kodu Klonla
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12 Kurulumu (Google AI Uyumluluğu İçin)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ⚙️ Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Apex Quant Motorunu Çalıştır (v21.0)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVDS_API_KEY: ${{ secrets.EVDS_API_KEY }}
          PORTFOLIO_CAPITAL: ${{ vars.PORTFOLIO_CAPITAL || '100000' }}
          STOCK_LIST: ${{ vars.STOCK_LIST || 'AKSA.IS,ASELS.IS,ASTOR.IS,BIMAS.IS,KATMR.IS,AKSEN.IS,OTKAR.IS,FROTO.IS,SISE.IS,ODINE.IS,MIATK.IS,TUPRS.IS,ALTNY.IS,THYAO.IS,KCHOL.IS,ISMEN.IS,RALYH.IS,SOKM.IS,KONTR.IS,MAVI.IS' }}
        run: python main.py
