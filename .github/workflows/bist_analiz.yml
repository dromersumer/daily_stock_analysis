name: BIST Stratejik Analiz 🇹🇷

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi google-generativeai json_repair

      - name: Analizi Gerceklestir ve Ekrana Yazdir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PORTFOLIO_TYPE: "BIST"
          STOCK_LIST: "AKSA.IS,THYAO.IS,TUPRS.IS" 
        run: python main.py
