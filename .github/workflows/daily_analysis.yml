name: Hisse Senedi Akilli Analiz Sistemi

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Çalışma Modu'
        default: 'stocks-only'
        type: choice
        options: [full, market-only, stocks-only]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Kütüphaneleri Yükle
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Analizi Gerçekleştir
        id: analysis_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LITELLM_MODEL: "gemini/gemini-1.5-flash"
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          REALTIME_SOURCE_PRIORITY: 'yfinance'
        run: |
          # reports klasörünü garantiye alalım
          mkdir -p reports
          python main.py --no-market-review --force-run

      - name: Raporu Summary Kısmına Yaz
        if: always()
        run: |
          LATEST_REPORT=$(ls -t reports/*.md 2>/dev/null | head -n 1)
          if [ -f "$LATEST_REPORT" ]; then
            echo "### 📊 Dr. Ömer - Stratejik Analiz Sonuçları" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$LATEST_REPORT" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ HATA RAPORU" >> $GITHUB_STEP_SUMMARY
            echo "- Analiz betiği rapor dosyasını oluşturamadı." >> $GITHUB_STEP_SUMMARY
            echo "- Lütfen 'Analizi Gerçekleştir' adımındaki logları inceleyin." >> $GITHUB_STEP_SUMMARY
          fi
