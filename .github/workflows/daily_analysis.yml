name: Hisse Senedi Akilli Analiz Sistemi

on:
  schedule:
    - cron: '0 10 * * 1-5'
  # Manuel Tetikleme Yapilandirmasi (Mavi Buton)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Calisma Modu'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # Tam Analiz (Hisse + Piyasa)
          - market-only   # Sadece Piyasa Ozeti
          - stocks-only   # Sadece Hisse Analizi
      force_run:
        description: 'Zorla Calistir (Is günü kontrolünü atla)'
        required: false
        default: false
        type: boolean

# Ayni anda birden fazla analiz calismasini engeller
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Rastgele Gecikme (Sunucu güvenligi icin)
        run: sleep $((RANDOM % 30))
      
      - name: Kodu Cek (Checkout)
        uses: actions/checkout@v5
      
      - name: Python Ortamini Kur
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Bagimliliklari Yukle
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Gerekli Dizinleri Olustur
        run: mkdir -p data logs reports
      
      - name: Analizi Gerceklestir
        env:
          # AI Yapilandirmasi
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}

          # Gemini AI Ayarlari
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-1.5-flash' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-1.5-pro' }}
          GEMINI_REQUEST_DELAY: '3.0'
          
          # Bildirim ve Arama Kanallari
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # Portföy ve Piyasa Ayarlari
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'us' }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          
          # KRITIK HIZ AYARI: Yahoo Finance (yfinance) en basa alindi
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'yfinance,tencent,akshare_sina,efinance' }}
          LOG_LEVEL: INFO
          
        run: |
          # Calisma Modu ve Zorlama Ayari
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          echo "🚀 Analiz Baslatiliyor... Mod: $MODE"
          
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: Analiz Raporlarini Yukle (Artifacts)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analiz-raporlari-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Sonucu Ekrana Yazdir
        if: always()
        run: |
          echo "=========================================="
          echo "📊 Analiz Islemi Tamamlandi"
          echo "=========================================="
          ls -R reports/ 2>/dev/null || echo "⚠️ Rapor dosyasi bulunamadi."
