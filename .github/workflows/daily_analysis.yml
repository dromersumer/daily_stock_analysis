name: Hisse Senedi Akilli Analiz Sistemi

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}
  # KRİTİK: Tüm market kısıtlamalarını kaldırıyoruz
  TRADING_DAY_CHECK: 'false'
  DEFAULT_MARKET: 'US'
  MARKET_REGION: 'US'
  ENABLE_DAILY_STOCKS_ONLY: 'true'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Kütüphaneleri Yükle
        run: |
          pip install --upgrade pip
          pip install yfinance==0.2.40  # Sabit ve stabil sürüm
          pip install -r requirements.txt

      - name: Analizi Gerçekleştir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LITELLM_MODEL: "gemini/gemini-1.5-flash"
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          # yfinance bağlantısını stabilize ediyoruz
          REALTIME_SOURCE_PRIORITY: 'yfinance'
        run: |
          mkdir -p reports
          python main.py --no-market-review --force-run

      - name: Raporu Summary Kısmına Yaz
        if: always()
        run: |
          LATEST_REPORT=$(ls -t reports/*.md 2>/dev/null | head -n 1)
          if [ -f "$LATEST_REPORT" ]; then
            echo "### 📊 Dr. Ömer - Stratejik Analiz Sonuçları" > $GITHUB_STEP_SUMMARY
            cat "$LATEST_REPORT" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Hata: Veri Motoru Yanıt Vermedi" >> $GITHUB_STEP_SUMMARY
            echo "GitHub sunucuları Yahoo Finance'e şu an erişemiyor olabilir." >> $GITHUB_STEP_SUMMARY
          fi
