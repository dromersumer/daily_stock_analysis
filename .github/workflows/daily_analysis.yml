name: Hisse Senedi Akilli Analiz Sistemi

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}
  # BİST hisseleri için bölge kısıtlamalarını tamamen eziyoruz
  TRADING_DAY_CHECK: 'false'
  DEFAULT_MARKET: 'US'
  MARKET_REGION: 'US'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Kütüphaneleri Yükle
        run: |
          pip install --upgrade pip
          pip install yfinance requests --upgrade
          pip install -r requirements.txt

      - name: Analizi Gerçekleştir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LITELLM_MODEL: "gemini/gemini-1.5-flash"
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          # yfinance'i tek geçiş yolu yap
          REALTIME_SOURCE_PRIORITY: 'yfinance'
          # Gecikme ekleyerek bloklanmayı önlemeye çalış
          GEMINI_REQUEST_DELAY: '2.0'
        run: |
          mkdir -p reports
          python main.py --no-market-review --force-run
