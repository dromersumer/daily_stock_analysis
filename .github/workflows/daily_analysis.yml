name: Hisse Senedi Akilli Analiz Sistemi

on:
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Kutuphaneleri Yukle
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Analizi Gerceklestir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # --- DR. ÖMER'İN GÜNCEL PORTFÖY LİSTESİ ---
          STOCK_LIST: "YUNSA.IS,VBTYZ.IS,UCAYM.IS,TUPRS.IS,TRALT.IS,THYAO.IS,SOKM.IS,SISE.IS,SDTTR.IS,RUZYE.IS,RALYH.IS,OTKAR.IS,ONRYT.IS,ODINE.IS,NETCD.IS,MIATK.IS,KONTR.IS,KATMR.IS,ISMEN.IS,FROTO.IS,ENJSA.IS,EMPAE.IS,DURDO.IS,BIMAS.IS,ASTOR.IS,ASELS.IS,ALTNY.IS,AKSEN.IS"
        run: |
          mkdir -p reports
          python main.py

      - name: Raporu Summary Kismina Yaz
        if: always()
        run: |
          LATEST_REPORT=$(ls -t reports/*.md 2>/dev/null | head -n 1)
          if [ -f "$LATEST_REPORT" ]; then
            echo "### 📊 Dr. Ömer - Stratejik Analiz Sonuçları" > $GITHUB_STEP_SUMMARY
            cat "$LATEST_REPORT" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Hata: Rapor Dosyası Bulunamadı" >> $GITHUB_STEP_SUMMARY
          fi
