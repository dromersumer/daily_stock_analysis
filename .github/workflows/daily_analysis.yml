name: Hisse Senedi Akilli Analiz Sistemi

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod'
        default: 'stocks-only'
        type: choice
        options: [full, market-only, stocks-only]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}
  # BİST hisseleri için bölgeyi ABD/Global moduna alıyoruz
  DEFAULT_MARKET: 'US'
  MARKET_REGION: 'US'
  TRADING_DAY_CHECK: 'false' # Takvim hatasını engellemek için

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Kütüphaneleri Yükle
        run: |
          pip install --upgrade pip
          # yfinance'ın en güncel sürüm olduğundan emin olalım
          pip install yfinance --upgrade
          pip install -r requirements.txt

      - name: Analizi Gerçekleştir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LITELLM_MODEL: "gemini/gemini-1.5-flash"
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          # Veri çekme önceliği
          REALTIME_SOURCE_PRIORITY: 'yfinance'
        run: |
          mkdir -p reports
          python main.py --no-market-review --force-run
