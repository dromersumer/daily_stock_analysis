name: Hisse Senedi Akilli Analiz Sistemi

on:
  workflow_dispatch:

env:
  # Node.js 24 uyarısını ve takvim hatalarını kapatan ayarlar
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}
  TRADING_DAY_CHECK: 'false'
  DEFAULT_MARKET: 'tr'
  MARKET_REGION: 'tr'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Kütüphaneleri Yükle
        run: |
          pip install --upgrade pip
          # En kritik kütüphanelerin yüklendiğinden emin oluyoruz
          pip install yfinance requests litellm json-repair markdown2 --upgrade
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Analizi Gerçekleştir
        env:
          # --- KRİTİK AYARLAR ---
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Değişken boşsa diye buraya hisseleri manuel sabitledik:
          STOCK_LIST: "ASELS.IS,ASTOR.IS,THYAO.IS,TUPRS.IS,YUNSA.IS"
          REALTIME_SOURCE_PRIORITY: 'yfinance'
        run: |
          mkdir -p reports
          # Çince piyasa özetini atlayıp doğrudan analize geçiyoruz
          python main.py --no-market-review --force-run

      - name: Raporu Summary Kısmına Yaz
        if: always()
        run: |
          LATEST_REPORT=$(ls -t reports/*.md 2>/dev/null | head -n 1)
          if [ -f "$LATEST_REPORT" ]; then
            echo "### 📊 Dr. Ömer - Stratejik Analiz Sonuçları" > $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$LATEST_REPORT" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Hata: Rapor Oluşturulamadı" >> $GITHUB_STEP_SUMMARY
            echo "Hisse listesi veya API bağlantısı kontrol edilmelidir." >> $GITHUB_STEP_SUMMARY
          fi
