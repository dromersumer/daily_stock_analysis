name: Hisse Senedi Akilli Analiz Sistemi

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Calisma Modu'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: 'Zorla Calistir'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # SISTEM GENEL DIL AYARI
  LANGUAGE: 'Turkish'
  REPORT_LANGUAGE: 'Turkish'

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Kodu Cek (Checkout)
        uses: actions/checkout@v4
      
      - name: Python Ortamini Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Bagimliliklari Yukle
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Gerekli Dizinleri Olustur
        run: mkdir -p data logs reports
      
      - name: Analizi Gerceklestir
        env:
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          
          # KRITIK: Gemini'ye raporu Turkce yazmasini emreden ayarlar
          LANGUAGE: 'Turkish'
          REPORT_LANGUAGE: 'Turkish'
          ANALYSIS_LANGUAGE: 'Turkish'
          
          # HIZ AYARI
          REALTIME_SOURCE_PRIORITY: 'yfinance'
          GEMINI_REQUEST_DELAY: '2.0'
          LOG_LEVEL: INFO
          
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          echo "🚀 Analiz Baslatiliyor (Dil: Turkce)..."
          
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: Raporlari Yukle (Artifacts)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analiz-raporlari-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Raporu Summary Kisminda Goster
        if: always()
        run: |
          LATEST_REPORT=$(ls -t reports/*.md 2>/dev/null | head -n 1)
          if [ -f "$LATEST_REPORT" ]; then
            # Raporun basligini Turkce olarak summary'e ekle
            echo "### 📊 Hisse Senedi Akıllı Analiz Raporu" >> $GITHUB_STEP_SUMMARY
            cat "$LATEST_REPORT" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Rapor Dosyasi Bulunamadi" >> $GITHUB_STEP_SUMMARY
          fi
