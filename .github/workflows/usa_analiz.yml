name: USA Portfolio Analysis

on:
  schedule:
    - cron: '30 18 * * 1-5' # Hafta içi her gün TSİ 18:30 civarı çalışır
  workflow_dispatch:      # Manuel tetikleme için

jobs:
  run-portfolio-manager:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run USA Quant Engine
        env:
          PORTFOLIO_TYPE: 'ABD'
          PORTFOLIO_CAPITAL: '10000'
          STOCK_LIST: 'QQQM,NVDA,AVGO,SPUS,INTC,GOOG,SCHD,MU,SMH,LITE,CAT,CHAT,PL,NVTS,NASA,XLE,QQQI,TSM'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WOLFRAM_ALPHA_APPID: ${{ secrets.WOLFRAM_ALPHA_APPID }}
        run: python main.py
