name: ABD Stratejik Analiz 🇺🇸

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
      
      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kutuphaneleri Yukle
        run: pip install -r requirements.txt

      - name: Analizi Gerceklestir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PORTFOLIO_TYPE: "ABD"
          STOCK_LIST: "ADI,AMAT,ASML,AVGO,ASX,AXTI,BABA,CEG,GOOG,INTC,MU,NET,NVDA,NVTS,QBTS,REI,RGTI,TSM,UUUU,VRT,WDC"
        run: python main.py

      - name: Google Drive'a PDF Yukle
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: reports/*.pdf
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: false
