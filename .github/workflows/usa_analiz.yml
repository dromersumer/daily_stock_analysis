name: ABD Hisse Analiz Ömer

on:
  schedule:
    - cron: '30 20 * * 1-5'
  workflow_dispatch: 

jobs:
  run-portfolio-manager:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Kodu Klonla
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12 Kurulumu (Google AI Uyumluluğu İçin)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ⚙️ Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Apex Quant Motorunu Çalıştır (ABD)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PORTFOLIO_TYPE: "ABD"
          PORTFOLIO_CAPITAL: ${{ vars.PORTFOLIO_CAPITAL || '100000' }}
          STOCK_LIST: ${{ vars.STOCK_LIST || 'ADI,AVGO,CAT,CHAT,GNRC,GOOG,INTC,LITE,MU,NVDA,NVTS,QQQI,QQQM,REMX,SCHD,SMH,SPUS,TSM,XLE' }}
        run: python main.py
